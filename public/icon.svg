<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="#020617"/>

  <!-- Subtle background glow -->
  <circle cx="256" cy="230" r="250" fill="#0b3a75" opacity="0.28"/>

  <!-- Left wing -->
  <g fill="#e5e7eb" stroke="#94a3b8" stroke-width="6" stroke-linejoin="round">
    <path d="M52 168 C104 140 158 128 218 132 L196 164 C144 164 96 176 52 206 Z"/>
    <path d="M70 220 C112 202 154 194 196 198 L180 228 C140 226 104 234 70 252 Z"/>
    <path d="M96 270 C128 258 160 254 188 260 L176 288 C146 284 120 290 96 304 Z"/>
  </g>

  <!-- Right wing -->
  <g fill="#e5e7eb" stroke="#94a3b8" stroke-width="6" stroke-linejoin="round">
    <path d="M460 168 C408 140 354 128 294 132 L316 164 C368 164 416 176 460 206 Z"/>
    <path d="M442 220 C400 202 358 194 316 198 L332 228 C372 226 408 234 442 252 Z"/>
    <path d="M416 270 C384 258 352 254 324 260 L336 288 C366 284 392 290 416 304 Z"/>
  </g>

  <!-- Shield outer gold trim -->
  <path
    d="M256 72 L382 126 V228 C382 326 322 406 256 444 C190 406 130 326 130 228 V126 Z"
    fill="#facc15"
  />

  <!-- Shield dark outline -->
  <path
    d="M256 90 L364 138 V228 C364 312 313 382 256 416 C199 382 148 312 148 228 V138 Z"
    fill="#020617"
  />

  <!-- Shield blue body -->
  <path
    d="M256 108 L346 148 V228 C346 298 304 358 256 390 C208 358 166 298 166 228 V148 Z"
    fill="#1e3a8a"
  />

  <!-- Inner shield highlight -->
  <path
    d="M256 124 L330 158 V226 C330 282 296 334 256 362 C216 334 182 282 182 226 V158 Z"
    fill="#2563eb"
    opacity="0.72"
  />

  <!-- Three Cadet Colonel / Spaatz style diamonds -->
  <g stroke="#fff7cc" stroke-width="5" stroke-linejoin="round">
    <!-- Top diamond -->
    <path d="M256 132 L296 172 L256 212 L216 172 Z" fill="#facc15"/>
    <path d="M256 132 L256 212 L216 172 Z" fill="#fde68a" opacity="0.75"/>
    <path d="M256 132 L296 172 L256 212 Z" fill="#b45309" opacity="0.35"/>

    <!-- Left diamond -->
    <path d="M206 224 L246 264 L206 304 L166 264 Z" fill="#facc15"/>
    <path d="M206 224 L206 304 L166 264 Z" fill="#fde68a" opacity="0.75"/>
    <path d="M206 224 L246 264 L206 304 Z" fill="#b45309" opacity="0.35"/>

    <!-- Right diamond -->
    <path d="M306 224 L346 264 L306 304 L266 264 Z" fill="#facc15"/>
    <path d="M306 224 L306 304 L266 264 Z" fill="#fde68a" opacity="0.75"/>
    <path d="M306 224 L346 264 L306 304 Z" fill="#b45309" opacity="0.35"/>
  </g>

  <!-- Divider star / wings under shield -->
  <path d="M256 410 L272 438 L256 430 L240 438 Z" fill="#facc15"/>
  <path d="M145 418 L234 410 L244 420 L145 424 Z" fill="#facc15"/>
  <path d="M367 418 L278 410 L268 420 L367 424 Z" fill="#facc15"/>

  <!-- CADET text -->
  <text
    x="256"
    y="482"
    text-anchor="middle"
    font-size="54"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    letter-spacing="6"
    fill="#facc15"
  >
    CADET
  </text>
</svg>